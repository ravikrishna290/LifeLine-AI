<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Emergency Home Selector</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e53734",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211111",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col items-center">
<div class="w-full max-w-[960px] flex-1 flex flex-col px-4 md:px-10 py-5">
<header class="flex items-center justify-between border-b border-solid border-primary/10 pb-4 mb-6">
<div class="flex items-center gap-3 text-primary">
<span class="material-symbols-outlined text-3xl font-bold">emergency</span>
<h1 class="text-slate-900 dark:text-slate-100 text-xl font-extrabold tracking-tighter uppercase">Emergency Selector</h1>
</div>
<div class="flex gap-2">
<button class="flex items-center justify-center rounded-lg h-12 w-12 bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">notifications</span>
</button>
<button class="flex items-center justify-center rounded-lg h-12 w-12 bg-primary/10 text-primary hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</header>
<div class="mb-8">
<h2 class="text-4xl font-black leading-tight tracking-tight text-slate-900 dark:text-slate-100">Find Emergency Resources</h2>
<p class="text-slate-600 dark:text-slate-400 text-lg mt-2">AI-powered rapid medical assistance locator.</p>
</div>
<div class="grid grid-cols-2 gap-4 md:gap-6 mb-10">
<button class="group flex flex-col items-center justify-center gap-4 p-8 bg-white dark:bg-slate-800 border-2 border-transparent hover:border-primary rounded-xl shadow-sm transition-all transform active:scale-95">
<div class="size-16 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-4xl">local_hospital</span>
</div>
<span class="text-lg font-bold text-slate-900 dark:text-slate-100">Hospital</span>
</button>
<button class="group flex flex-col items-center justify-center gap-4 p-8 bg-white dark:bg-slate-800 border-2 border-transparent hover:border-primary rounded-xl shadow-sm transition-all transform active:scale-95">
<div class="size-16 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-4xl">ambulance</span>
</div>
<span class="text-lg font-bold text-slate-900 dark:text-slate-100">Ambulance</span>
</button>
<button class="group flex flex-col items-center justify-center gap-4 p-8 bg-white dark:bg-slate-800 border-2 border-transparent hover:border-primary rounded-xl shadow-sm transition-all transform active:scale-95">
<div class="size-16 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-4xl">bloodtype</span>
</div>
<span class="text-lg font-bold text-slate-900 dark:text-slate-100">Blood Bank</span>
</button>
<button class="group flex flex-col items-center justify-center gap-4 p-8 bg-white dark:bg-slate-800 border-2 border-transparent hover:border-primary rounded-xl shadow-sm transition-all transform active:scale-95">
<div class="size-16 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:bg-primary group-hover:text-white transition-colors">
<span class="material-symbols-outlined text-4xl">medical_services</span>
</div>
<span class="text-lg font-bold text-slate-900 dark:text-slate-100">Oxygen</span>
</button>
</div>
<div class="mb-10">
<h3 class="text-xl font-bold mb-4 flex items-center gap-2">
<span class="material-symbols-outlined text-primary">priority_high</span>
                        Urgency Level
                    </h3>
<div class="flex bg-slate-200 dark:bg-slate-800 p-1.5 rounded-xl">
<label class="flex-1 cursor-pointer">
<input checked="" class="peer sr-only" name="urgency" type="radio"/>
<div class="flex items-center justify-center py-3 rounded-lg text-slate-600 dark:text-slate-400 font-bold peer-checked:bg-primary peer-checked:text-white transition-all scale-110 shadow-lg">
                                Critical
                            </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="urgency" type="radio"/>
<div class="flex items-center justify-center py-3 rounded-lg text-slate-600 dark:text-slate-400 font-bold peer-checked:bg-primary peer-checked:text-white transition-all">
                                Moderate
                            </div>
</label>
<label class="flex-1 cursor-pointer">
<input class="peer sr-only" name="urgency" type="radio"/>
<div class="flex items-center justify-center py-3 rounded-lg text-slate-600 dark:text-slate-400 font-bold peer-checked:bg-primary peer-checked:text-white transition-all">
                                Low
                            </div>
</label>
</div>
</div>
<div class="mt-auto pb-24">
<button class="w-full bg-primary text-white py-8 rounded-2xl text-2xl font-black uppercase tracking-widest shadow-[0_0_30px_rgba(229,55,52,0.4)] hover:shadow-[0_0_50px_rgba(229,55,52,0.6)] transition-all transform active:scale-95 flex items-center justify-center gap-4">
<span class="material-symbols-outlined text-4xl">search_check</span>
                        Find Nearest Help
                    </button>
</div>
</div>
<footer class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 p-4 flex gap-4 z-50">
<button class="flex-1 bg-primary text-white py-4 rounded-xl font-extrabold flex items-center justify-center gap-2 shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">call</span>
                    Quick Call Ambulance
                </button>
<button class="flex-1 bg-blue-600 text-white py-4 rounded-xl font-extrabold flex items-center justify-center gap-2 shadow-lg shadow-blue-600/20">
<span class="material-symbols-outlined">location_on</span>
                    Share GPS
                </button>
</footer>
</div>
</div>
</body></html>
